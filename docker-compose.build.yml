services:
  fntv-admin:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: fntv-admin:local
    container_name: fntv-admin
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - /usr/local/apps/@appdata/trim.media/database:/fntv
    environment:
      APP_NAME: ${APP_NAME:-fntv-admin}
      APP_ENV: ${APP_ENV:-production}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-this-to-a-long-random-string}
      FNTV_DB_PATH: ${FNTV_DB_PATH:-/fntv/trimmedia.db}
      ADMIN_DB_PATH: ${ADMIN_DB_PATH:-/data/admin.db}
      LOG_DIR: ${LOG_DIR:-/data/logs}
      CACHE_DIR: ${CACHE_DIR:-/data/cache}
      BACKUP_DIR: ${BACKUP_DIR:-/data/backup}
      DEFAULT_PAGE_SIZE: ${DEFAULT_PAGE_SIZE:-20}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14}
